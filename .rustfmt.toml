# https://rust-lang.github.io/rustfmt

required_version = ">=1.9.0"
edition = "2024"
unstable_features = true

max_width = 160
comment_width = 160

# Lines
binop_separator = "Front"
empty_item_single_line = true
force_multiline_blocks = false
inline_attribute_width = 120
match_arm_blocks = true
newline_style = "Unix"
short_array_element_width_threshold = 8
where_single_line = false

# Braces
brace_style = "SameLineWhere"
control_brace_style = "AlwaysSameLine"

# Condensing
condense_wildcard_suffixes = true
combine_control_expr = true
fn_params_layout = "Tall"
fn_single_line = true
merge_derives = true
overflow_delimited_expr = true
remove_nested_parens = true
single_line_if_else_max_width = 120
single_line_let_else_max_width = 120
struct_lit_single_line = true
struct_lit_width = 32
struct_variant_width = 32
use_small_heuristics = "Default"

# Literals
hex_literal_case = "Lower"
float_literal_trailinig_zero = "Always"

# Tabs
hard_tabs = false
tab_spaces = 4

# Alignment
enum_discrim_align_threshold = 32
struct_field_align_threshold = 32

# Strings
format_strings = false

# Explicitness
force_explicit_abi = true
match_arm_leading_pipes = "Always"
match_block_trailing_comma = true
trailing_comma = "Vertical"
trailing_semicolon = false
use_field_init_shorthand = true
use_try_shorthand = true

# Imports
imports_indent = "Block"
imports_layout = "Mixed"
imports_granularity = "Module"
reorder_imports = true
group_imports = "StdExternalCrate"
reorder_modules = true
skip_children = false

# Indentation
indent_style = "Block"
match_arm_indent = true

# Ordering
reorder_impl_items = true

# Spacing
space_after_colon = true
space_before_colon = false
space_around_ranges = false
type_punctuation_density = "Wide"

# Comments
wrap_comments = true
normalize_comments = true
normalize_doc_attributes = true
format_code_in_doc_comments = true

# Macros
format_macro_matchers = true
format_macro_bodies = true
